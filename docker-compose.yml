services:
  # 1. The Database (PostgreSQL)
  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=saas_db
    ports:
      - "5432:5432"

  # 2. The AI Memory (ChromaDB)
  chroma:
    image: chromadb/chroma:latest
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ALLOW_RESET=TRUE
    ports:
      - "8001:8000"

  # 3. The Backend (FastAPI)
  backend:
    build: ./backend
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - chroma

  # 4. The Frontend (Admin Dashboard)
  frontend:
    build: ./frontend
    restart: always
    volumes:
      - ./frontend:/app
      - /app/node_modules # Don't override container's node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # 5. The Widget (Embeddable Chat)
  widget:
    build:
      context: ./widget
      dockerfile: ../frontend/Dockerfile # Reuse frontend Dockerfile logic
    restart: always
    volumes:
      - ./widget:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - backend

volumes:
  postgres_data:
  chroma_data:

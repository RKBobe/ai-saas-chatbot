version: '3.9'

services:
  # 1. The Database (Postgres)
  db:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=saas_db
    ports:
      - "5432:5432"

  # 2. The AI Memory (ChromaDB)
  chroma:
    image: chromadb/chroma:latest
    restart: always
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    ports:
      # We map host port 8001 to container port 8000
      # so it doesn't conflict with your FastAPI app (which is on 8000)
      - "8001:8000"

volumes:
  postgres_data:
  chroma_data: